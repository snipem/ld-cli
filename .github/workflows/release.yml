name: Release Binaries

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: windows
            goarch: amd64
            suffix: .exe
          - goos: windows
            goarch: arm64
            suffix: .exe
          - goos: linux
            goarch: amd64
            suffix: ''
          - goos: linux
            goarch: arm64
            suffix: ''
          - goos: darwin
            goarch: amd64
            suffix: ''
          - goos: darwin
            goarch: arm64
            suffix: ''

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v4
        with:
          go-version: '1.22'
          cache: true

      - name: Build ldcli
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          COMMIT=${{ github.sha }}
          BUILD_TIME=$(date -u '+%Y-%m-%d %H:%M:%S UTC')
          BINARY_NAME=ldcli-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.suffix }}
          go build \
            -ldflags "-X main.Version=$VERSION -X main.Commit=$COMMIT -X main.BuildTime=$BUILD_TIME" \
            -o "$BINARY_NAME" ./cmd/ldcli

      - name: Upload release artifacts
        uses: softprops/action-gh-release@v1
        with:
          files: ldcli-*
          draft: false
          prerelease: false
